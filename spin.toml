#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "example"
version = "0.1.0"
authors = ["Brian Hardock <brian.hardock@fermyon.com>"]
description = ""

[[trigger.http]]
route = "/..."
component = "example"

[component.example]
source = "target/wasm32-wasip2/release/example.wasm"
allowed_outbound_hosts = []
[component.example.build]
command = "cargo build --target wasm32-wasip2 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
[component.example.dependencies]
"abc:xyz" = { path = "deps/dep.wasm" }